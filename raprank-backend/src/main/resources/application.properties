# ─── Database ───────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/raprank_db
spring.datasource.username=raprank_user
spring.datasource.password=raprank123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Redis ──────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ─── JWT ────────────────────────────────────────────────
app.jwt.secret=raprank-super-secret-key-minimum-32-chars-long-2026
app.jwt.expiration=86400000

# ─── File Upload ────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─── Server ─────────────────────────────────────────────
server.port=8080

# ─── Internal Services ──────────────────────────────────
app.python.service.url=http://localhost:8000
app.go.service.url=http://localhost:9090

# ─── Storage ────────────────────────────────────────────
app.storage.audio-dir=uploads/audio
