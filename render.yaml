services:
  # 1. Main Spring Boot Core Backend
  - type: web
    name: raprank-backend
    runtime: docker
    dockerfilePath: ./raprank-backend/Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_HOST
        fromDatabase:
          name: raprank-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: raprank-db
          property: database
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}/${DB_NAME}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: raprank-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: raprank-db
          property: password
      - key: APP_PYTHON_SERVICE_URL
        value: https://mechreaper007x-raprank-whisper.hf.space
      - key: APP_GO_SERVICE_URL
        fromService:
          type: web
          name: raprank-upload
          property: host
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_JWT_EXPIRATION
        value: "86400000"

  # 2. Go Audio Upload Service
  - type: web
    name: raprank-upload
    runtime: docker
    dockerfilePath: ./raprank-upload/Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: "9090"

  # 3. Vite React Frontend
  - type: web
    name: beatlyrix-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: raprank-backend
          property: host
      - key: VITE_UPLOAD_API_URL
        fromService:
          type: web
          name: raprank-upload
          property: host

databases:
  - name: raprank-db
    plan: free
    databaseName: raprank_db
    user: raprank_user
    region: singapore
